name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            backend/ebitengine/go.sum
            backend/gpu/go.sum
            backend/sdl2/go.sum
            examples/demo/go.sum
            examples/demo_gpu/go.sum
            examples/demo_sdl2/go.sum
            examples/showcase_gpu/go.sum

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype-dev \
            libglib2.0-dev \
            libgl1-mesa-dev \
            libpango1.0-dev \
            libsdl2-dev \
            pkg-config

      - name: Test all modules
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail

          modules=(
            "."
            "backend/ebitengine"
            "backend/gpu"
            "backend/sdl2"
            "examples/demo"
            "examples/demo_gpu"
            "examples/demo_sdl2"
            "examples/showcase_gpu"
          )

          for module in "${modules[@]}"; do
            echo "==> go test ./... ($module)"
            (
              cd "$module"
              go test ./...
            )
          done

  test-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build root package for WASM
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Build WASM backend modules
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail

          modules=(
            "backend/web"
            "examples/showcase_web"
          )

          for module in "${modules[@]}"; do
            echo "==> go build ./... ($module)"
            ( cd "$module" && go build ./... )
          done

      - name: Vet WASM packages
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          go vet ./...
          ( cd backend/web && go vet ./... )

  test-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Resolve iOS simulator SDK paths
        id: sdk
        run: |
          echo "sdk_path=$(xcrun --sdk iphonesimulator --show-sdk-path)" >> "$GITHUB_OUTPUT"
          echo "cc_path=$(xcrun --sdk iphonesimulator --find clang)" >> "$GITHUB_OUTPUT"

      - name: Build root package for iOS
        env:
          CGO_ENABLED: "1"
          GOOS: ios
          GOARCH: arm64
          CC: ${{ steps.sdk.outputs.cc_path }}
          CGO_CFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
          CGO_LDFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
        run: go build -tags ios ./...

      - name: Build iOS backend modules
        env:
          CGO_ENABLED: "1"
          GOOS: ios
          GOARCH: arm64
          CC: ${{ steps.sdk.outputs.cc_path }}
          CGO_CFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
          CGO_LDFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
        run: |
          set -euo pipefail

          modules=(
            "backend/ios"
            "examples/showcase_ios"
          )

          for module in "${modules[@]}"; do
            echo "==> go build ./... ($module)"
            ( cd "$module" && go build ./... )
          done

      - name: Vet iOS packages
        env:
          CGO_ENABLED: "1"
          GOOS: ios
          GOARCH: arm64
          CC: ${{ steps.sdk.outputs.cc_path }}
          CGO_CFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
          CGO_LDFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
        run: |
          set -euo pipefail
          go vet -tags ios ./...
          ( cd backend/ios && go vet ./... )

  test-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            backend/ebitengine/go.sum
            backend/gpu/go.sum
            backend/sdl2/go.sum
            examples/demo/go.sum
            examples/demo_gpu/go.sum
            examples/demo_sdl2/go.sum
            examples/showcase_gpu/go.sum

      - name: Install native dependencies
        run: brew install sdl2 pango pkg-config

      - name: Test root packages
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Build macOS backend modules and examples
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail

          modules=(
            "backend/ebitengine"
            "backend/gpu"
            "backend/sdl2"
            "examples/demo"
            "examples/demo_gpu"
            "examples/demo_sdl2"
            "examples/showcase_gpu"
          )

          for module in "${modules[@]}"; do
            echo "==> go build ./... ($module)"
            (
              cd "$module"
              go build ./...
            )
          done
