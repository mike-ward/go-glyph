name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            examples/demo/go.sum
            examples/demo_gpu/go.sum
            examples/demo_sdl2/go.sum
            examples/showcase_gpu/go.sum

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype-dev \
            libglib2.0-dev \
            libgl1-mesa-dev \
            libpango1.0-dev \
            libsdl2-dev \
            pkg-config

      - name: Test root module
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Build examples
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail

          modules=(
            "examples/demo"
            "examples/demo_gpu"
            "examples/demo_sdl2"
            "examples/showcase_gpu"
          )

          for module in "${modules[@]}"; do
            echo "==> go build ./... ($module)"
            ( cd "$module" && go build ./... )
          done

  test-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build root package for WASM
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Build WASM example
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
        run: ( cd examples/showcase_web && go build ./... )

      - name: Vet WASM packages
        env:
          GOOS: js
          GOARCH: wasm
          CGO_ENABLED: "0"
        run: go vet ./...

  test-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Resolve iOS simulator SDK paths
        id: sdk
        run: |
          echo "sdk_path=$(xcrun --sdk iphonesimulator --show-sdk-path)" >> "$GITHUB_OUTPUT"
          echo "cc_path=$(xcrun --sdk iphonesimulator --find clang)" >> "$GITHUB_OUTPUT"

      - name: Build root package for iOS
        env:
          CGO_ENABLED: "1"
          GOOS: ios
          GOARCH: arm64
          CC: ${{ steps.sdk.outputs.cc_path }}
          CGO_CFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
          CGO_LDFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
        run: go build -tags ios ./...

      - name: Build iOS example
        env:
          CGO_ENABLED: "1"
          GOOS: ios
          GOARCH: arm64
          CC: ${{ steps.sdk.outputs.cc_path }}
          CGO_CFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
          CGO_LDFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
        run: ( cd examples/showcase_ios && go build ./... )

      - name: Vet iOS packages
        env:
          CGO_ENABLED: "1"
          GOOS: ios
          GOARCH: arm64
          CC: ${{ steps.sdk.outputs.cc_path }}
          CGO_CFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
          CGO_LDFLAGS: "-isysroot ${{ steps.sdk.outputs.sdk_path }} -mios-simulator-version-min=17.0"
        run: go vet -tags ios ./...

  test-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            examples/showcase_android/go.sum

      - name: Resolve Android NDK toolchain
        id: ndk
        run: |
          TC="${ANDROID_NDK_LATEST_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "cc=${TC}/aarch64-linux-android21-clang" >> "$GITHUB_OUTPUT"

      - name: Build Android native deps (FreeType + HarfBuzz)
        run: ANDROID_NDK_HOME="${ANDROID_NDK_LATEST_HOME}" ./scripts/build_android_deps.sh

      - name: Build root package for Android
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: arm64
          CC: ${{ steps.ndk.outputs.cc }}
        run: go build ./...

      - name: Build Android example
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: arm64
          CC: ${{ steps.ndk.outputs.cc }}
          CGO_LDFLAGS: "-L${{ github.workspace }}/deps/lib/arm64-v8a"
        run: ( cd examples/showcase_android && go build ./... )

      - name: Compile tests
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: arm64
          CC: ${{ steps.ndk.outputs.cc }}
          CGO_LDFLAGS: "-L${{ github.workspace }}/deps/lib/arm64-v8a"
        run: |
          set -euo pipefail
          go test -c -o /dev/null .
          ( cd examples/showcase_android && go test -c -o /dev/null . )

      - name: Vet Android packages
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: arm64
          CC: ${{ steps.ndk.outputs.cc }}
        run: go vet ./...

  test-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install MSYS2 and dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-freetype
            mingw-w64-ucrt-x86_64-harfbuzz
            mingw-w64-ucrt-x86_64-pango
            mingw-w64-ucrt-x86_64-fontconfig

      - name: Set CGo environment
        shell: bash
        run: |
          echo "CGO_ENABLED=1" >> "$GITHUB_ENV"
          echo "CC=C:/msys64/ucrt64/bin/gcc.exe" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=C:/msys64/ucrt64/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "C:/msys64/ucrt64/bin" >> "$GITHUB_PATH"

      - name: Test root module
        run: go test ./...

      - name: Build root package
        run: go build ./...

      - name: Vet Windows packages
        run: go vet ./...

  test-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            examples/demo/go.sum
            examples/demo_gpu/go.sum
            examples/demo_sdl2/go.sum
            examples/showcase_gpu/go.sum

      - name: Install native dependencies
        run: brew install sdl2 pango pkg-config

      - name: Test root module
        env:
          CGO_ENABLED: "1"
        run: go test ./...

      - name: Build examples
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail

          modules=(
            "examples/demo"
            "examples/demo_gpu"
            "examples/demo_sdl2"
            "examples/showcase_gpu"
          )

          for module in "${modules[@]}"; do
            echo "==> go build ./... ($module)"
            ( cd "$module" && go build ./... )
          done
